name: Release MCP server

# Tag-triggered release: publishes the npm package and updates the MCP
# Registry listing. Tag format: `mcp-vX.Y.Z` (must match mcp-server/package.json
# version). Example:
#
#   git tag mcp-v0.3.0
#   git push --tags

on:
  push:
    tags:
      - "mcp-v*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # OIDC for npm provenance + mcp-publisher GitHub auth

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#mcp-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          SRV_VERSION=$(node -p "require('./server.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$SRV_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match server.json version $SRV_VERSION"
            exit 1
          fi

      - run: npm ci

      - run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz -C /tmp
          sudo mv /tmp/mcp-publisher /usr/local/bin/

      - name: Authenticate with the MCP Registry via GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish to the MCP Registry
        run: mcp-publisher publish

  deploy-worker:
    runs-on: ubuntu-latest
    needs: publish
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: mcp-server
